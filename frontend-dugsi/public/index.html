<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Nawawi School</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Diiwaangelinta Ardayda</h2>
        <form id="studentForm">
            <input type="text" id="name" placeholder="Magaca Ardayga" required>
            <input type="text" id="class" placeholder="Fasalka" required>
            <button type="submit">Keydi</button>
        </form>
        <p id="res"></p>
    </div>
    <script>
        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const className = document.getElementById('class').value;
            const res = await fetch('/api/students', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, class: className })
            });
            if(res.ok) {
                document.getElementById('res').innerText = "✅ Waa la keydiyey!";
                document.getElementById('studentForm').reset();
            }
        });
    </script>
</body>
</html>
