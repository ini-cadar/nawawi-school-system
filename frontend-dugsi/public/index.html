<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawawi School Management</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px; margin-left: auto; margin-right: auto; }
        h2 { color: #1a73e8; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .present { color: green; font-weight: bold; }
        .absent { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div class="section">
        <h2>Diiwaangelinta Ardayda</h2>
        <input type="text" id="stdName" placeholder="Magaca Ardayga">
        <input type="text" id="stdClass" placeholder="Fasalka (e.g. Form 4)">
        <button onclick="addStudent()">Keydi Ardayga</button>
    </div>

    <div class="section">
        <h2>Attendance-ka Maanta</h2>
        <div id="attendanceList">Loading students...</div>
    </div>

    <script>
        async function loadData() {
            const res = await fetch('/api/students');
            const students = await res.json();
            const list = document.getElementById('attendanceList');
            list.innerHTML = '';
            
            students.forEach(s => {
                list.innerHTML += `
                    <div class="list-item">
                        <span>${s.name} (${s.class})</span>
                        <div>
                            <button style="width:70px; background:green;" onclick="mark('${s._id}', 'Present')">P</button>
                            <button style="width:70px; background:red;" onclick="mark('${s._id}', 'Absent')">A</button>
                        </div>
                    </div>`;
            });
        }

        async function addStudent() {
            const name = document.getElementById('stdName').value;
            const className = document.getElementById('stdClass').value;
            await fetch('/api/students', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, class: className})
            });
            location.reload();
        }

        async function mark(id, status) {
            await fetch('/api/attendance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({studentId: id, status: status})
            });
            alert(`Calaamadda ${status} waa la keydiyey!`);
        }

        loadData();
    </script>
</body>
</html>
