<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Nawawi Pro | Global System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #0f172a; --blue: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 280px; background: var(--main); color: white; height: 100vh; position: fixed; padding: 25px; box-sizing: border-box; }
        .sidebar button { width: 100%; padding: 15px; background: none; border: none; color: #94a3b8; text-align: left; cursor: pointer; border-radius: 10px; margin-bottom: 5px; }
        .sidebar button:hover { background: var(--blue); color: white; }
        .content { margin-left: 280px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        #loginBox { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 360px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="login-card">
        <h2>NAWAWI PRO</h2>
        <select id="role"><option value="student">Student Portal</option><option value="admin">Admin Portal</option></select>
        <input id="uID" placeholder="NBS Code / Admin User">
        <input id="uPass" type="password" placeholder="Password">
        <button onclick="login()" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; margin-top:20px; border-radius:10px;">Login</button>
    </div>
</div>

<div id="side" class="sidebar" style="display:none">
    <h2 style="text-align:center">NBS PRO</h2>
    <div id="menu"></div>
    <button onclick="location.reload()" style="color:red; margin-top:50px;"><i class="fas fa-power-off"></i> Logout</button>
</div>

<div id="main" class="content" style="display:none">
    <div id="view"></div>
</div>

<script>
    let user = null;

    async function login() {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({role: role.value, id: uID.value, pass: uPass.value})
        });
        const data = await res.json();
        if(data.success) {
            user = data;
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('side').style.display = 'block';
            document.getElementById('main').style.display = 'block';
            data.role === 'admin' ? loadAdmin() : loadStudent();
        } else alert("Xogtu waa khaldan tahay!");
    }

    function loadAdmin() {
        document.getElementById('menu').innerHTML = `
            <button onclick="adminView()"><i class="fas fa-users"></i> Manage Classes</button>
            <button onclick="addStudent()"><i class="fas fa-plus"></i> Add Student</button>
        `;
        adminView();
    }

    function loadStudent() {
        const s = user.data;
        document.getElementById('menu').innerHTML = `
            <button onclick="stDash()"><i class="fas fa-home"></i> Dashboard</button>
            <button onclick="stAtt()"><i class="fas fa-check-circle"></i> Attendance</button>
            <button onclick="stFee()"><i class="fas fa-money-bill"></i> Fee Status</button>
            <button onclick="stExam()"><i class="fas fa-file-alt"></i> Exams</button>
        `;
        stDash();
    }

    function stDash() {
        const s = user.data;
        document.getElementById('view').innerHTML = `
            <div class="card"><h1>Soo dhowaw, ${s.fullName}</h1><p>ID: ${s.nbsCode}</p></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div class="card"><h3>Attendance (%)</h3><p style="font-size:30px; color:green;">100%</p></div>
                <div class="card"><h3>Exam Result</h3><p style="font-size:30px; color:blue;">${s.exam.average || 0}%</p></div>
            </div>
        `;
    }

    function stAtt() {
        const s = user.data;
        let rows = s.attendance.map(a => `<tr><td>${a.date}</td><td>${a.month}</td><td>${a.status}</td></tr>`).join('');
        document.getElementById('view').innerHTML = `
            <div class="card"><h3>Attendance History</h3>
            <table width="100%"><tr><th>Date</th><th>Month</th><th>Status</th></tr>${rows || '<tr><td colspan="3">Ma jiro maqnaansho.</td></tr>'}</table></div>
        `;
    }

    function stFee() {
        const s = user.data;
        document.getElementById('view').innerHTML = `
            <div class="card"><h3>Fee Status</h3>
            <p>Lacagta la bixiyey: $${s.fees.paid}</p>
            <p>Inta hartay: $${s.fees.total - s.fees.paid}</p>
            <p>Xaaladda: ${s.fees.paid >= s.fees.total ? 'Paid' : 'Unpaid'}</p></div>
        `;
    }
</script>
</body>
</html>
