<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>NBS System | Final Hubsan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #0f172a; --blue: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 260px; background: var(--main); color: white; height: 100vh; position: fixed; padding: 20px; }
        .sidebar button { width: 100%; padding: 12px; background: none; border: none; color: #94a3b8; text-align: left; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .sidebar button:hover { background: var(--blue); color: white; }
        .content { margin-left: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; }
        .btn-p { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; inset:0; background:white; display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div class="card" style="width:320px; text-align:center;">
        <h2>NBS LOGIN</h2>
        <select id="lRole"><option value="admin">Admin</option><option value="student">Student</option></select>
        <input id="lID" placeholder="NBS Code / Admin">
        <input id="lPass" type="password" placeholder="Password">
        <button class="btn-p" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="side" class="sidebar" style="display:none">
    <h2>NAWAWI PRO</h2>
    <button onclick="nav('attendance')">Attendance</button>
    <button onclick="nav('fee')">Fees</button>
    <button onclick="nav('exam')">Exams & Rank</button>
    <button onclick="showAdd()">Add Student</button>
    <button onclick="location.reload()" style="color:red; margin-top:50px;">Logout</button>
</div>

<div class="content" id="main" style="display:none">
    <div id="view"></div>
</div>

<script>
    let role = '';

    async function doLogin() {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({role: lRole.value, id: lID.value, pass: lPass.value})
        });
        const data = await res.json();
        if(data.success) {
            role = data.role;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('side').style.display = 'block';
            document.getElementById('main').style.display = 'block';
            if(role === 'admin') nav('attendance'); else showStudentView(data.data);
        } else alert("Khaldan!");
    }

    function nav(type) {
        document.getElementById('view').innerHTML = `
            <div class="card">
                <h3>Admin: ${type.toUpperCase()}</h3>
                <div style="display:flex; gap:10px;">
                    <select id="sC"><option value="9">9aad</option><option value="12">12aad</option></select>
                    <select id="sS"><option value="A">A</option><option value="B">B</option></select>
                    <button onclick="loadList('${type}')">Load</button>
                </div>
            </div>
            <div id="list"></div>
        `;
    }

    async function loadList(type) {
        const res = await fetch(`/api/students/${sC.value}/${sS.value}`);
        const students = await res.json();
        let html = `<div class="card"><table><tr><th>Magaca</th>`;
        
        if(type === 'attendance') {
            html += `<th>Status</th><th>Action</th></tr>`;
            students.forEach(s => {
                html += `<tr><td>${s.fullName}</td><td><select id="at-${s.nbsCode}"><option value="P">P</option><option value="A">A</option></select></td>
                <td><button onclick="saveAdmin('${s.nbsCode}', 'att')">Save</button></td></tr>`;
            });
        } else if(type === 'fee') {
            html += `<th>Paid</th><th>Action</th></tr>`;
            students.forEach(s => {
                html += `<tr><td>${s.fullName}</td><td>$${s.fees.paid}</td><td><button onclick="saveAdmin('${s.nbsCode}', 'fee')">Edit Fee</button></td></tr>`;
            });
        }
        document.getElementById('list').innerHTML = html + `</table></div>`;
    }

    async function saveAdmin(id, mode) {
        let payload = { nbsCode: id };
        if(mode === 'att') {
            payload.attendance = [{ date: new Date().toLocaleDateString(), status: document.getElementById(`at-${id}`).value }];
        } else if(mode === 'fee') {
            const amount = prompt("Geli lacagta:");
            if(!amount) return;
            payload["fees.paid"] = Number(amount);
        }
        
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert("Waa la keydiyey!");
        if(mode === 'fee') loadList('fee');
    }

    function showAdd() {
        document.getElementById('view').innerHTML = `
            <div class="card">
                <h3>Add New Student</h3>
                <input id="nC" placeholder="Code"> <input id="nN" placeholder="Name">
                <input id="nM" placeholder="Mother"> <input id="nP" placeholder="Phone">
                <button class="btn-p" onclick="submitAdd()">Save</button>
            </div>`;
    }

    async function submitAdd() {
        const data = { nbsCode: nC.value, fullName: nN.value, motherName: nM.value, parentPhone1: nP.value, class: "9", section: "A" };
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        alert("Ardayga waa la xareeyey!");
        nav('attendance');
    }

    function showStudentView(s) {
        document.getElementById('view').innerHTML = `
            <div class="card">
                <h1>Ku soo dhowaw, ${s.fullName}</h1>
                <p>NBS Code: ${s.nbsCode}</p>
                <h3>Natiijada: ${s.exam.average || 0}%</h3>
                <p>Lacagta: ${s.fees.paid >= s.fees.total ? 'Bixiyey' : 'Ma bixin'}</p>
            </div>`;
    }
</script>
</body>
</html>
