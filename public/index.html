<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Nawawi School System | Full Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nav: #0f172a; --accent: #2563eb; --bg: #f8fafc; --green: #22c55e; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 260px; background: var(--nav); color: white; height: 100vh; position: fixed; padding: 20px; }
        .sidebar button { width: 100%; padding: 12px; background: none; border: none; color: #94a3b8; text-align: left; cursor: pointer; margin-bottom: 10px; border-radius: 8px; font-size: 15px; }
        .sidebar button:hover, .sidebar button.active { background: var(--accent); color: white; }
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 25px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-p { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .p-green { background: #dcfce7; color: var(--green); }
        .a-red { background: #fee2e2; color: var(--red); }
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="card" style="width:350px; text-align:center;">
        <h2 style="color:var(--nav)">NBS MANAGEMENT</h2>
        <select id="role"><option value="admin">Maamule (Admin)</option><option value="student">Arday (Student)</option></select>
        <input id="uID" placeholder="NBS Code">
        <input id="uPass" type="password" placeholder="Password">
        <button class="btn-p" onclick="handleLogin()">Giri Dashboard</button>
    </div>
</div>

<div id="sideNav" class="sidebar" style="display:none">
    <h2 style="color:var(--accent); text-align:center; margin-bottom:30px;">NAWAWI PRO</h2>
    <div id="adminMenu">
        <button onclick="nav('attendance')" class="active"><i class="fas fa-calendar-alt"></i> Attendance (Sax/Khlad)</button>
        <button onclick="nav('exam')"><i class="fas fa-file-invoice"></i> Exams (12 Maado)</button>
        <button onclick="nav('fee')"><i class="fas fa-money-bill-wave"></i> Fees Management</button>
        <button onclick="showAddForm()"><i class="fas fa-user-plus"></i> Add New Student</button>
    </div>
    <button onclick="location.reload()" style="color:var(--red); margin-top:100px;"><i class="fas fa-power-off"></i> Logout</button>
</div>

<div id="mainView" class="main" style="display:none">
    <div id="dynamicContent"></div>
</div>

<script>
    const subNames = ["Math", "English", "Arabic", "Islamic", "Physics", "Chemistry", "Biology", "History", "Geography", "Somali", "ICT", "Business"];

    async function handleLogin() {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({role: role.value, id: uID.value, pass: uPass.value})
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('sideNav').style.display = 'block';
            document.getElementById('mainView').style.display = 'block';
            if(data.role === 'admin') nav('attendance'); else showStudentDashboard(data.data);
        } else alert("Invalid ID or Password!");
    }

    function nav(page) {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card">
                <h3>Management: ${page.toUpperCase()}</h3>
                <div style="display:flex; gap:15px; align-items: flex-end;">
                    <div style="flex:1">Fasalka: <select id="fC"><option value="9">9aad</option><option value="10">10aad</option><option value="11">11aad</option><option value="12">12aad</option></select></div>
                    <div style="flex:1">Section: <select id="fS"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select></div>
                    <button class="btn-p" style="width:200px; margin:0" onclick="loadList('${page}')">Show Students</button>
                </div>
            </div>
            <div id="listArea"></div>`;
    }

    async function loadList(type) {
        const res = await fetch(`/api/students/${fC.value}/${fS.value}`);
        const students = await res.json();
        const listArea = document.getElementById('listArea');

        if(students.length === 0) {
            listArea.innerHTML = `<div class="card" style="color:var(--red)">Arday lama helin! Fadlan marka hore isticmaal 'Add New Student'.</div>`;
            return;
        }

        let html = `<div class="card"><table><tr><th>Student Name</th><th>Options</th></tr>`;
        students.forEach(s => {
            html += `<tr><td>${s.fullName}</td><td>`;
            if(type === 'attendance') {
                html += `<button onclick="saveAdminData('${s.nbsCode}', 'P')" style="background:var(--green); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer">Sax ✅</button> 
                         <button onclick="saveAdminData('${s.nbsCode}', 'A')" style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer">Khlad ❌</button>`;
            } else if(type === 'exam') {
                html += `<button onclick="editExam('${s.nbsCode}')" class="btn-p" style="margin:0; width:auto; padding:8px 15px;">Enter Marks</button>`;
            } else if(type === 'fee') {
                html += `Paid: $${s.fees.paid} / $1200 | <button onclick="saveAdminData('${s.nbsCode}', 'fee')" style="padding:5px">Update</button>`;
            }
            html += `</td></tr>`;
        });
        listArea.innerHTML = html + `</table></div>`;
    }

    async function saveAdminData(id, modeOrStatus) {
        let payload = { nbsCode: id };
        if(modeOrStatus === 'P' || modeOrStatus === 'A') {
            payload.attendance = [{ date: new Date().toLocaleDateString(), status: modeOrStatus }];
        } else if(modeOrStatus === 'fee') {
            const amount = prompt("Geli lacagta:");
            if(!amount) return;
            payload.fees = { paid: Number(amount) };
        }
        await fetch('/api/admin/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        alert("Action Saved!");
    }

    async function editExam(id) {
        const res = await fetch(`/api/student/${id}`);
        const s = await res.json();
        let inputs = subNames.map((name, i) => {
            let score = (s.exam.subjects.find(x => x.name === name) || {score:0}).score;
            return `<div>${name}: <input id="sub-${i}" type="number" value="${score}"></div>`;
        }).join('');
        document.getElementById('listArea').innerHTML = `
            <div class="card">
                <h3>Exam Results: ${s.fullName}</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">${inputs}</div>
                <button class="btn-p" onclick="saveExam('${id}')">Save All 12 Subjects</button>
            </div>`;
    }

    async function saveExam(id) {
        let scores = subNames.map((name, i) => ({ name, score: Number(document.getElementById(`sub-${i}`).value) }));
        let avg = (scores.reduce((a,b) => a + b.score, 0) / 12).toFixed(2);
        await fetch('/api/admin/save', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ nbsCode: id, exam: { subjects: scores, average: avg } }) 
        });
        alert("Marks Saved!"); nav('exam');
    }

    function showAddForm() {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card" style="max-width:450px; margin:auto">
                <h3 style="text-align:center">Register New Student</h3>
                <input id="nc" placeholder="NBS Code (e.g. 101)">
                <input id="nn" placeholder="Student Full Name">
                <select id="ncl"><option value="9">9aad</option><option value="12">12aad</option></select>
                <select id="nsc"><option value="A">A</option><option value="B">B</option></select>
                <button class="btn-p" onclick="submitNew()">Save Student to Database</button>
            </div>`;
    }

    async function submitNew() {
        await fetch('/api/admin/save', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ nbsCode: nc.value, fullName: nn.value, class: ncl.value, section: nsc.value }) 
        });
        alert("Ardayga waa la keydiyey!"); nav('attendance');
    }

    function showStudentDashboard(s) {
        let attRows = (s.attendance || []).reverse().map(a => `<tr><td>${a.date}</td><td><span class="status-badge ${a.status==='P'?'p-green':'a-red'}">${a.status==='P'?'Joogay ✅':'Ma Joogin ❌'}</span></td></tr>`).join('');
        let examRows = (s.exam.subjects || []).map(sub => `<tr><td>${sub.name}</td><td><b>${sub.score}</b></td></tr>`).join('');
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card" style="background:var(--nav); color:white"><h2>Welcome, ${s.fullName}</h2><p>ID: ${s.nbsCode} | Class: ${s.class}${s.section}</p></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:25px">
                <div class="card"><h3>12-ka Maado</h3><table>${examRows}</table><h3 style="text-align:right">Avg: ${s.exam.average}%</h3></div>
                <div class="card"><h3>Attendance History</h3><table>${attRows}</table></div>
            </div>`;
    }
</script>
</body>
</html>
