<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Nawawi School System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nav: #0f172a; --blue: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 260px; background: var(--nav); color: white; height: 100vh; position: fixed; padding: 20px; }
        .sidebar h2 { color: var(--blue); text-align: center; }
        .sidebar button { width: 100%; padding: 12px; margin-bottom: 10px; border: none; background: none; color: #94a3b8; text-align: left; cursor: pointer; border-radius: 8px; font-size: 16px; }
        .sidebar button:hover, .sidebar button.active { background: var(--blue); color: white; }
        .main { margin-left: 260px; flex: 1; padding: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-p { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div id="loginBox" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:350px; text-align:center;">
        <h2>NBS SYSTEM</h2>
        <input id="uID" placeholder="ID (nawawi_admin)">
        <input id="uPass" type="password" placeholder="Password (7209379)">
        <button class="btn-p" onclick="handleLogin()">Login</button>
    </div>
</div>

<div class="sidebar">
    <h2>NBS PRO</h2>
    <button onclick="showNav('attendance')"><i class="fas fa-check-circle"></i> Attendance</button>
    <button onclick="showNav('exam')"><i class="fas fa-file-alt"></i> 12 Subjects</button>
    <button onclick="showNav('fee')"><i class="fas fa-money-bill"></i> Fee Management</button>
    <button onclick="showNav('add')"><i class="fas fa-user-plus"></i> Add Student</button>
    <button onclick="location.reload()" style="color:red; margin-top:50px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<div class="main">
    <div id="app"></div>
</div>

<script>
    const subjs = ["Math", "English", "Arabic", "Islamic", "Physics", "Chemistry", "Biology", "History", "Geography", "Somali", "ICT", "Business"];

    async function handleLogin() {
        if(uID.value === 'nawawi_admin' && uPass.value === '7209379') {
            document.getElementById('loginBox').style.display='none';
            showNav('attendance');
        } else { alert("Khlad!"); }
    }

    function showNav(page) {
        let html = `<div class="card"><h3>${page.toUpperCase()} PANEL</h3>`;
        if(page === 'add') {
            html += `<input id="nID" placeholder="NBS Code"><input id="nName" placeholder="Full Name">
                     <select id="nCl"><option value="9aad">9aad</option><option value="12aad">12aad</option></select>
                     <button class="btn-p" onclick="saveNew()">Register Student</button>`;
        } else {
            html += `<div style="display:flex; gap:10px;">
                        <select id="fC"><option value="9aad">9aad</option><option value="12aad">12aad</option></select>
                        <select id="fS"><option value="A">A</option><option value="B">B</option></select>
                        <button class="btn-p" style="margin:0; width:150px" onclick="loadList('${page}')">Fetch</button>
                     </div>`;
        }
        document.getElementById('app').innerHTML = html + `</div><div id="listArea"></div>`;
    }

    async function saveNew() {
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nbsCode: nID.value, fullName: nName.value, class: nCl.value, section: "A" })
        });
        alert("Ardayga waa la keydiyey!");
    }

    async function loadList(type) {
        const res = await fetch(`/api/students/${fC.value}/${fS.value}`);
        const students = await res.json();
        const area = document.getElementById('listArea');
        
        if(students.length === 0) {
            area.innerHTML = `<div class="card" style="color:red">Arday lama helin! Isticmaal 'Add Student'.</div>`;
            return;
        }

        let table = `<div class="card"><table><tr><th>Student</th><th>Action</th></tr>`;
        students.forEach(s => {
            table += `<tr><td>${s.fullName}</td><td>`;
            if(type === 'attendance') {
                table += `<button onclick="quickSave('${s.nbsCode}','P')" style="background:green; color:white; padding:5px; border:none; border-radius:4px; cursor:pointer">P</button> 
                          <button onclick="quickSave('${s.nbsCode}','A')" style="background:red; color:white; padding:5px; border:none; border-radius:4px; cursor:pointer">A</button>`;
            } else if(type === 'exam') {
                table += `<button class="btn-p" style="margin:0; width:auto; padding:5px 10px;" onclick="openExam('${s.nbsCode}')">Marks</button>`;
            } else {
                table += `Paid: $${s.fees.paid} | <button onclick="quickSave('${s.nbsCode}','fee')">Update</button>`;
            }
            table += `</td></tr>`;
        });
        area.innerHTML = table + `</table></div>`;
    }

    async function quickSave(id, val) {
        let payload = { nbsCode: id };
        if(val === 'P' || val === 'A') payload.attendance = [{ date: new Date().toLocaleDateString(), status: val }];
        if(val === 'fee') payload.fees = { paid: Number(prompt("Geli lacagta:")) };
        
        await fetch('/api/admin/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        alert("Success!");
    }

    async function openExam(id) {
        let html = `<div class="card"><h3>Enter 12 Subjects Marks</h3><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">`;
        subjs.forEach((m, i) => html += `<div>${m}: <input id="m-${i}" type="number" value="0"></div>`);
        html += `</div><button class="btn-p" onclick="saveMarks('${id}')">Save All Marks</button></div>`;
        document.getElementById('listArea').innerHTML = html;
    }

    async function saveMarks(id) {
        let marks = subjs.map((n, i) => ({ name: n, score: Number(document.getElementById(`m-${i}`).value) }));
        let avg = (marks.reduce((a, b) => a + b.score, 0) / 12).toFixed(2);
        await fetch('/api/admin/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nbsCode: id, exam: { subjects: marks, average: avg } })
        });
        alert("Marks Saved! Average: " + avg);
        showNav('exam');
    }
</script>
</body>
</html>
