<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawawi School System</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; height: 100vh; display: flex; overflow: hidden; }
        
        /* LOGIN PAGE - Full Screen Overlay */
        #loginPage { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--primary); display: flex; justify-content: center; 
            align-items: center; z-index: 9999; 
        }
        .login-box { background: var(--white); padding: 40px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-box input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .login-box button { width: 97%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* DASHBOARD STRUCTURE */
        #dashboardWrapper { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; height: 100vh; }
        .sidebar h2 { padding: 25px; text-align: center; border-bottom: 1px solid #455d75; margin: 0; font-size: 1.2rem; }
        .menu-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; border-bottom: 1px solid #3e58713b; }
        .menu-item:hover { background: var(--secondary); }
        .menu-item.active { background: var(--accent); }

        .main-content { flex: 1; overflow-y: auto; padding: 30px; background: #f4f7f6; }
        .header { background: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; }

        .hidden { display: none !important; }
        button.action-btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-box">
            <h2 style="color: var(--primary);">UOB PORTAL LOGIN</h2>
            <input type="text" id="username" placeholder="Roll Number / Admin">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">LOGIN</button>
        </div>
    </div>

    <div id="dashboardWrapper" class="hidden">
        <nav class="sidebar">
            <h2>NBS PORTAL</h2>
            <div class="menu-item active" onclick="showPage('overview')">🏠 Dashboard</div>
            <div id="adminLink1" class="menu-item hidden" onclick="showPage('registration')">📝 Registration</div>
            <div id="adminLink2" class="menu-item hidden" onclick="showPage('management')">📊 Management</div>
            <div id="studentLink1" class="menu-item hidden" onclick="showPage('myResults')">📚 My Results</div>
            <div class="menu-item" style="margin-top: auto; background: var(--danger);" onclick="logout()">🚪 Logout</div>
        </nav>

        <main class="main-content">
            <div class="header">
                <h2 id="sectionTitle">Overview</h2>
                <div>
                    <span id="userDisp" style="font-weight: bold; margin-right: 10px;"></span>
                    <span id="roleDisp" style="background: #eee; padding: 4px 10px; border-radius: 15px; font-size: 12px;"></span>
                </div>
            </div>

            <section id="overview" class="page-content">
                <div class="box">
                    <h3>Ku soo dhawaada nidaamka Nawawi School.</h3>
                    <p>Fasalka: 2025/2026 | Maanta: <span id="currentDate"></span></p>
                </div>
            </section>

            <section id="registration" class="page-content hidden">
                <div class="box">
                    <h3>Diiwaangeli Arday Cusub</h3>
                    <input type="text" id="rName" placeholder="Magaca Saddexan" style="width: 45%;">
                    <input type="text" id="rRoll" placeholder="Roll Number (NBS001)" style="width: 45%;">
                    <select id="rGrade" style="width: 45%; padding: 12px; margin-top: 10px;">
                        <option value="9">Fasalka 9aad</option>
                        <option value="10">Fasalka 10aad</option>
                        <option value="11">Fasalka 11aad</option>
                        <option value="12">Fasalka 12aad</option>
                    </select>
                    <button onclick="saveStudent()" style="margin-top: 20px; display: block;">Keydi Xogta</button>
                </div>
            </section>

            <section id="management" class="page-content hidden">
                <div class="box">
                    <h3>Maamulidda Ardayda</h3>
                    <select id="fGrade" onchange="loadStudents()">
                        <option value="9">Fasalka 9aad</option>
                        <option value="10">Fasalka 10aad</option>
                        <option value="11">Fasalka 11aad</option>
                        <option value="12">Fasalka 12aad</option>
                    </select>
                    <table>
                        <thead><tr><th>Magaca</th><th>Roll No</th><th>Falka</th></tr></thead>
                        <tbody id="studentTableBody"></tbody>
                    </table>
                </div>
            </section>

            <section id="myResults" class="page-content hidden">
                <div class="box">
                    <h3>Natiijada Imtixaanka</h3>
                    <table id="myMarksTable">
                        <thead><tr><th>Maaddada</th><th>Dhibcaha</th><th>Natiijada</th></tr></thead>
                        <tbody id="myMarksBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        let currentUser = null;
        const subjects = ["Tarbiya", "Carabi", "Soomaali", "English", "Math", "Physics", "Chemistry", "Biology", "Geography", "History", "ICT", "Business"];

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin1234') {
                currentUser = { role: 'admin', name: 'Administrator' };
                setupUI();
            } else {
                const res = await fetch(`/api/student/me/${user}`);
                const data = await res.json();
                if (data && pass === '123456') {
                    currentUser = { role: 'student', ...data };
                    setupUI();
                } else {
                    alert("Roll Number ama Password waa khalad!");
                }
            }
        }

        function setupUI() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardWrapper').classList.remove('hidden');
            document.getElementById('userDisp').innerText = currentUser.fullName || currentUser.name;
            document.getElementById('roleDisp').innerText = currentUser.role.toUpperCase();
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString();

            if (currentUser.role === 'admin') {
                document.getElementById('adminLink1').classList.remove('hidden');
                document.getElementById('adminLink2').classList.remove('hidden');
            } else {
                document.getElementById('studentLink1').classList.remove('hidden');
                loadMyResults();
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            event.currentTarget.classList.add('active');
            document.getElementById('sectionTitle').innerText = id.charAt(0).toUpperCase() + id.slice(1);
        }

        async function saveStudent() {
            const data = {
                fullName: document.getElementById('rName').value,
                examNumber: document.getElementById('rRoll').value,
                grade: document.getElementById('rGrade').value,
                motherName: "Lama sheegin"
            };
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const resData = await res.json();
            alert(resData.message);
        }

        async function loadStudents() {
            const g = document.getElementById('fGrade').value;
            const res = await fetch(`/api/filter?grade=${g}`);
            const students = await res.json();
            const body = document.getElementById('studentTableBody');
            body.innerHTML = '';
            students.forEach(s => {
                body.innerHTML += `<tr><td>${s.fullName}</td><td>${s.examNumber}</td><td><button class="action-btn" style="background:orange">Edit</button></td></tr>`;
            });
        }

        function loadMyResults() {
            const body = document.getElementById('myMarksBody');
            body.innerHTML = '';
            const scores = currentUser.examScores || [];
            subjects.forEach(sub => {
                const s = scores.find(x => x.subject === sub);
                const val = s ? s.score : 0;
                const status = val >= 50 ? '<span style="color:green">Pass</span>' : '<span style="color:red">Fail</span>';
                body.innerHTML += `<tr><td>${sub}</td><td>${val}</td><td>${status}</td></tr>`;
            });
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
