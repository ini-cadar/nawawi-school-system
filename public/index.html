<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Nawawi Pro | Full System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nav: #0f172a; --accent: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 280px; background: var(--nav); color: white; height: 100vh; position: fixed; padding: 25px; box-sizing: border-box; }
        .sidebar h2 { color: var(--accent); border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .sidebar button { width: 100%; padding: 14px; background: none; border: none; color: #94a3b8; text-align: left; cursor: pointer; border-radius: 10px; margin-bottom: 8px; font-size: 15px; }
        .sidebar button:hover, .active-btn { background: var(--accent); color: white; }
        .main-view { margin-left: 280px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: left; }
        #loginPortal { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 5000; }
    </style>
</head>
<body>

<div id="loginPortal">
    <div class="card" style="width:360px; text-align:center;">
        <h2 style="margin-top:0">NBS PORTAL</h2>
        <select id="role"><option value="admin">Admin Portal</option><option value="student">Student Portal</option></select>
        <input id="uID" placeholder="Username / NBS Code">
        <input id="uPass" type="password" placeholder="Password">
        <button class="btn-action" onclick="handleLogin()">Giri Portal-ka</button>
    </div>
</div>

<div id="sidebar" class="sidebar" style="display:none">
    <h2>NAWAWI PRO</h2>
    <button onclick="nav('attendance')"><i class="fas fa-calendar-alt"></i> Attendance</button>
    <button onclick="nav('fee')"><i class="fas fa-money-bill-wave"></i> Fee Management</button>
    <button onclick="nav('exam')"><i class="fas fa-trophy"></i> Exam & Ranking</button>
    <button onclick="openAddStudent()"><i class="fas fa-plus-circle"></i> Add Student</button>
    <button onclick="location.reload()" style="color:#ef4444; margin-top:100px;"><i class="fas fa-power-off"></i> Logout</button>
</div>

<div id="main" class="main-view" style="display:none">
    <div id="contentArea"></div>
</div>

<script>
    let activeRole = '';

    async function handleLogin() {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({role: role.value, id: uID.value, pass: uPass.value})
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('loginPortal').style.display = 'none';
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('main').style.display = 'block';
            activeRole = data.role;
            nav('attendance');
        } else alert("Macluumaad Khaldan!");
    }

    function nav(type) {
        document.getElementById('contentArea').innerHTML = `
            <div class="card">
                <h3>Maamulka ${type.toUpperCase()}</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:15px; align-items: end;">
                    <div><label>Fasalka</label><select id="cC"><option value="9">9aad</option><option value="10">10aad</option><option value="11">11aad</option><option value="12">12aad</option></select></div>
                    <div><label>Section</label><select id="cS"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select></div>
                    <button class="btn-action" onclick="loadClassData('${type}')" style="margin:0; width:150px">Load List</button>
                </div>
            </div>
            <div id="listResult"></div>
        `;
    }

    async function loadClassData(type) {
        const res = await fetch(`/api/students/${cC.value}/${cS.value}`);
        const students = await res.json();
        let html = `<div class="card"><table><tr><th>Magaca</th>`;

        if(type === 'attendance') {
            html += `<th>Status Today</th><th>Action</th></tr>`;
            students.forEach(s => {
                html += `<tr><td>${s.fullName}</td><td><select id="att-${s.nbsCode}"><option value="P">Present</option><option value="A">Absent</option></select></td>
                <td><button onclick="saveAtt('${s.nbsCode}')">Save</button></td></tr>`;
            });
        } else if(type === 'fee') {
            html += `<th>Status</th><th>Bixiyey</th><th>Action</th></tr>`;
            students.forEach(s => {
                let status = s.fees.paid >= s.fees.total ? "<span style='color:green'>● Bixiyey</span>" : "<span style='color:red'>● Ma bixin</span>";
                html += `<tr><td>${s.fullName}</td><td>${status}</td><td>$${s.fees.paid}</td><td><button onclick="editFee('${s.nbsCode}')">Update Fee</button></td></tr>`;
            });
        } else if(type === 'exam') {
            html += `<th>Average</th><th>Rank</th><th>Action</th></tr>`;
            students.sort((a,b) => (b.exam.average || 0) - (a.exam.average || 0));
            students.forEach((s, i) => {
                html += `<tr><td>${s.fullName}</td><td>${s.exam.average || 0}%</td><td><b>#${i+1}</b></td><td><button onclick="openExamEditor('${s.nbsCode}')">Edit 12 Subjects</button></td></tr>`;
            });
        }
        document.getElementById('listResult').innerHTML = html + `</table></div>`;
    }

    function openAddStudent() {
        document.getElementById('contentArea').innerHTML = `
            <div class="card" style="max-width:600px; margin:auto">
                <h3>Diiwaangeli Arday Cusub</h3>
                <input id="nC" placeholder="NBS Code">
                <input id="nN" placeholder="Magaca Saddexan">
                <input id="nM" placeholder="Magaca Hooyada">
                <input id="nP1" placeholder="Telefoonka Waalidka (1)">
                <input id="nP2" placeholder="Telefoonka Waalidka (2)">
                <select id="nCl"><option value="9">9aad</option><option value="10">10aad</option><option value="11">11aad</option><option value="12">12aad</option></select>
                <select id="nSe"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
                <button class="btn-action" onclick="submitAdd()">Save Student</button>
            </div>
        `;
    }

    async function submitAdd() {
        const student = {
            nbsCode: nC.value, fullName: nN.value, motherName: nM.value,
            parentPhone1: nP1.value, parentPhone2: nP2.value, class: nCl.value, section: nSe.value
        };
        await fetch('/api/students/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(student)
        });
        alert("Waa la xareeyey!");
        nav('attendance');
    }

    async function openExamEditor(id) {
        const res = await fetch(`/api/student/${id}`);
        const s = await res.json();
        let subjects = s.exam.subjects.length > 0 ? s.exam.subjects : Array(12).fill({name: 'Subject', score: 0});
        
        let inputs = subjects.map((sub, i) => `
            <div style="display:flex; gap:10px; margin-top:10px">
                <input id="sn-${i}" value="${sub.name}" style="flex:2">
                <input id="ss-${i}" type="number" value="${sub.score}" style="flex:1">
            </div>
        `).join('');

        document.getElementById('contentArea').innerHTML = `
            <div class="card">
                <h3>Dhibcaha Imtixaanka: ${s.fullName}</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px">${inputs}</div>
                <button class="btn-action" onclick="saveExamResults('${id}')">Calculate & Save</button>
                <button onclick="nav('exam')" style="width:100%; background:#94a3b8; border:none; padding:10px; border-radius:8px; color:white; margin-top:10px; cursor:pointer">Cancel</button>
            </div>
        `;
    }

    async function saveExamResults(id) {
        let subs = [];
        for(let i=0; i<12; i++) {
            subs.push({ name: document.getElementById(`sn-${i}`).value, score: Number(document.getElementById(`ss-${i}`).value) });
        }
        let avg = (subs.reduce((a, b) => a + b.score, 0) / 12).toFixed(2);
        await fetch('/api/students/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nbsCode: id, exam: { subjects: subs, average: avg } })
        });
        alert("Imtixaanka waa la kaydiyey!");
        nav('exam');
    }
</script>
</body>
</html>
