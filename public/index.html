<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Nawawi Pro | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nav: #0f172a; --blue: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--nav); color: white; height: 100vh; position: fixed; padding: 20px; }
        .sidebar button { width: 100%; padding: 14px; background: none; border: none; color: #94a3b8; text-align: left; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .sidebar button:hover { background: var(--blue); color: white; }
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        #loginBox { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="card" style="width:320px; text-align:center;">
        <h2 style="color:var(--nav)">NBS LOGIN</h2>
        <select id="lRole"><option value="admin">Admin</option><option value="student">Student</option></select>
        <input id="lID" placeholder="NBS Code / Admin User">
        <input id="lPass" type="password" placeholder="Password">
        <button onclick="login()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; margin-top:15px; border-radius:8px; cursor:pointer;">Login</button>
    </div>
</div>

<div id="side" class="sidebar" style="display:none">
    <h2 style="text-align:center; color:var(--blue)">NBS PRO</h2>
    <button onclick="showFilter('attendance')"><i class="fas fa-calendar-check"></i> Attendance</button>
    <button onclick="showFilter('fee')"><i class="fas fa-wallet"></i> Fee Management</button>
    <button onclick="showFilter('exam')"><i class="fas fa-file-invoice"></i> Exams & Ranking</button>
    <button onclick="showAddForm()"><i class="fas fa-user-plus"></i> Add Student</button>
    <button onclick="location.reload()" style="color:red; margin-top:50px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<div id="main" class="main" style="display:none">
    <div id="content"></div>
</div>

<script>
    let currentData = null;

    async function login() {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({role: lRole.value, id: lID.value, pass: lPass.value})
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('side').style.display = 'block';
            document.getElementById('main').style.display = 'block';
            showFilter('attendance');
        } else alert("Details khaldan!");
    }

    function showFilter(type) {
        document.getElementById('content').innerHTML = `
            <div class="card">
                <h3>Select Class & Section (${type.toUpperCase()})</h3>
                <div style="display:flex; gap:10px;">
                    <select id="fC"><option value="9">9aad</option><option value="10">10aad</option><option value="11">11aad</option><option value="12">12aad</option></select>
                    <select id="fS"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
                    <button onclick="loadList('${type}')" style="background:var(--blue); color:white; border:none; padding:10px; border-radius:5px;">Load Students</button>
                </div>
            </div>
            <div id="listArea"></div>
        `;
    }

    async function loadList(type) {
        const res = await fetch(`/api/students/${fC.value}/${fS.value}`);
        const students = await res.json();
        let html = `<div class="card"><table><tr><th>Name</th>`;

        if(type === 'attendance') {
            html += `<th>Status</th><th>Action</th></tr>`;
            students.forEach(s => {
                html += `<tr><td>${s.fullName}</td><td><select id="at-${s.nbsCode}"><option value="P">Present</option><option value="A">Absent</option></select></td>
                <td><button onclick="saveAtt('${s.nbsCode}')">Save</button></td></tr>`;
            });
        } else if(type === 'fee') {
            html += `<th>Status</th><th>Paid</th><th>Action</th></tr>`;
            students.forEach(s => {
                let status = s.fees.paid >= s.fees.total ? "<b style='color:green'>Bixiyey</b>" : "<b style='color:red'>Ma bixin</b>";
                html += `<tr><td>${s.fullName}</td><td>${status}</td><td>$${s.fees.paid}</td><td><button onclick="editFee('${s.nbsCode}')">Edit</button></td></tr>`;
            });
        } else if(type === 'exam') {
            html += `<th>Average</th><th>Rank</th><th>Action</th></tr>`;
            students.sort((a,b) => (b.exam.average || 0) - (a.exam.average || 0));
            students.forEach((s, i) => {
                html += `<tr><td>${s.fullName}</td><td>${s.exam.average || 0}%</td><td>#${i+1}</td><td><button onclick="editExam('${s.nbsCode}')">Edit Marks</button></td></tr>`;
            });
        }
        document.getElementById('listArea').innerHTML = html + `</table></div>`;
    }

    function showAddForm() {
        document.getElementById('content').innerHTML = `
            <div class="card">
                <h3>Add New Student</h3>
                <input id="nCode" placeholder="NBS Code">
                <input id="nName" placeholder="Magaca Saddexan">
                <input id="nMother" placeholder="Magaca Hooyada">
                <input id="nP1" placeholder="Telefoonka 1 (Waalidka)">
                <input id="nP2" placeholder="Telefoonka 2 (Waalidka)">
                <select id="nC"><option value="9">9aad</option><option value="10">10aad</option><option value="11">11aad</option><option value="12">12aad</option></select>
                <select id="nS"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
                <button onclick="saveStudent()" style="width:100%; background:var(--blue); color:white; padding:12px; border:none; border-radius:8px; margin-top:15px;">Save</button>
            </div>
        `;
    }

    async function saveStudent() {
        const data = {
            nbsCode: nCode.value, fullName: nName.value, motherName: nMother.value,
            parentPhone1: nP1.value, parentPhone2: nP2.value, class: nC.value, section: nS.value
        };
        await fetch('/api/students/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        alert("Waa la guuleystay!");
        showFilter('attendance');
    }
</script>
</body>
</html>
